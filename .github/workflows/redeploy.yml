name: Redeploy on PR Merge

on:
  pull_request:
    types:
      - closed

jobs:
  redeploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Setup Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Create or update test file
      run: |
        FILE_PATH="test.txt"

        # Create the file if it doesn't exist
        if [ ! -f $FILE_PATH ]; then
          touch $FILE_PATH
        fi

        # Toggle an empty line in the file
        if grep -q "^$" $FILE_PATH; then
          # Remove empty lines
          sed -i '/^$/d' $FILE_PATH
        else
          # Add an empty line at the end
          echo "" >> $FILE_PATH
        fi

        # Stage the file
        git add $FILE_PATH

    - name: Commit changes
      run: |
        git config --global user.name "SandeepDev1"
        git config --global user.email "saisandeep1811@gmail.com"
        git commit -m "Toggle empty line in test file on PR merge" || echo "No changes to commit"

    - name: Push changes
      uses: ad-m/github-push-action@v0.6.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
